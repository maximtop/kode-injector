stages:
  - validate
  - native-test
  - package
  - sign
  - release

extension-validate:
  stage: validate
  image: node:24
  script:
    - corepack enable
    - pnpm install --frozen-lockfile
    - pnpm validate

native-test:
  stage: native-test
  image: golang:1.26
  script:
    - cd native-host
    - go test -race ./...

native-package:
  stage: package
  tags: [macos]
  script:
    - corepack enable
    - pnpm install --frozen-lockfile
    - pnpm native:package
  artifacts:
    paths:
      - build/native/

native-sign:
  stage: sign
  tags: [macos]
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/'
  script:
    - PACKAGE_VERSION="${CI_COMMIT_TAG#v}"
    - test "$PACKAGE_VERSION" = "$(node -p "require('./package.json').version")"
    - scripts/native-host/notarize.sh build/native/*/*-darwin-universal.dmg
    - |
      cd build/native/${CI_COMMIT_TAG#v}
      shasum -a 256 kode-injector-native-* > SHA256SUMS
  artifacts:
    expire_in: 30 days
    paths:
      - build/native/
  needs: [native-package]

publish-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/cli:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/'
      when: manual
      allow_failure: false
  script:
    - PACKAGE_VERSION="${CI_COMMIT_TAG#v}"
    - PACKAGE_JSON_VERSION="$(sed -n 's/^[[:space:]]*"version":[[:space:]]*"\([^"]*\)".*/\1/p' package.json)"
    - test "$PACKAGE_VERSION" = "$PACKAGE_JSON_VERSION"
    - cd "build/native/$PACKAGE_VERSION"
    - sha256sum -c SHA256SUMS
    - cd ../../..
    - >-
      glab release create "$CI_COMMIT_TAG"
      build/native/$PACKAGE_VERSION/*
      --name "Kode Injector Native Host $PACKAGE_VERSION"
      --notes "Signed native host installers for Kode Injector $PACKAGE_VERSION."
      --use-package-registry
      --package-name kode-injector-native
      --no-update
  needs:
    - job: native-sign
      artifacts: true
