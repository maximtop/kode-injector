name: Native host release

on:
  workflow_dispatch:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read

jobs:
  validate-release:
    name: Validate release context
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release-context.outputs.version }}
      tag: ${{ steps.release-context.outputs.tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
      - name: Validate version and tagged commit
        id: release-context
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [[ ! "$PACKAGE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "package.json version is not semantic: $PACKAGE_VERSION" >&2
            exit 1
          fi

          RELEASE_TAG="v$PACKAGE_VERSION"
          if [[ "$EVENT_NAME" == "push" ]]; then
            RELEASE_TAG="${RELEASE_REF#refs/tags/}"
            if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Release tag must match vX.Y.Z: $RELEASE_TAG" >&2
              exit 1
            fi
            if [[ "$RELEASE_TAG" != "v$PACKAGE_VERSION" ]]; then
              echo "Tag $RELEASE_TAG does not match package version $PACKAGE_VERSION" >&2
              exit 1
            fi

            git fetch origin master
            TAG_COMMIT="$(git rev-parse "$RELEASE_TAG^{commit}")"
            if ! git merge-base --is-ancestor "$TAG_COMMIT" origin/master; then
              echo "Tagged commit must be reachable from master" >&2
              exit 1
            fi
          fi

          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

  build-and-sign:
    name: Build, sign, and notarize candidate
    needs: validate-release
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      KODE_INJECTOR_EDGE_ID: ${{ vars.KODE_INJECTOR_EDGE_ID }}
      APPLE_DEVELOPER_ID: ${{ vars.APPLE_DEVELOPER_ID }}
      APPLE_NOTARY_KEY_ID: ${{ vars.APPLE_NOTARY_KEY_ID }}
      APPLE_NOTARY_ISSUER_ID: ${{ vars.APPLE_NOTARY_ISSUER_ID }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26.x'
      - name: Install dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile
      - name: Configure isolated Apple signing credentials
        shell: bash
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_NOTARY_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          : "${APPLE_CERTIFICATE_P12_BASE64:?APPLE_CERTIFICATE_P12_BASE64 is required}"
          : "${APPLE_CERTIFICATE_PASSWORD:?APPLE_CERTIFICATE_PASSWORD is required}"
          : "${APPLE_NOTARY_KEY_P8_BASE64:?APPLE_NOTARY_KEY_P8_BASE64 is required}"
          : "${APPLE_DEVELOPER_ID:?APPLE_DEVELOPER_ID is required}"
          : "${APPLE_NOTARY_KEY_ID:?APPLE_NOTARY_KEY_ID is required}"
          : "${APPLE_NOTARY_ISSUER_ID:?APPLE_NOTARY_ISSUER_ID is required}"

          KEYCHAIN_PATH="$RUNNER_TEMP/kode-injector-signing.keychain-db"
          CERTIFICATE_PATH="$RUNNER_TEMP/kode-injector-signing.p12"
          NOTARY_KEY_PATH="$RUNNER_TEMP/kode-injector-notary-key.p8"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"

          printf '%s' "$APPLE_CERTIFICATE_P12_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          printf '%s' "$APPLE_NOTARY_KEY_P8_BASE64" | base64 -D > "$NOTARY_KEY_PATH"
          chmod 600 "$CERTIFICATE_PATH" "$NOTARY_KEY_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          echo "SIGNING_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "SIGNING_CERTIFICATE_PATH=$CERTIFICATE_PATH" >> "$GITHUB_ENV"
          echo "APPLE_NOTARY_KEY_PATH=$NOTARY_KEY_PATH" >> "$GITHUB_ENV"
      - name: Build native packages
        run: pnpm native:package
      - name: Sign and notarize macOS packages
        shell: bash
        env:
          PACKAGE_VERSION: ${{ needs.validate-release.outputs.version }}
        run: |
          set -euo pipefail
          while IFS= read -r package; do
            scripts/native-host/notarize.sh "build/native/$PACKAGE_VERSION/$package"
          done < <(pnpm exec tsx scripts/native-host/package.ts --list-macos-artifacts)
      - name: Independently inspect final macOS packages
        shell: bash
        env:
          PACKAGE_VERSION: ${{ needs.validate-release.outputs.version }}
        run: |
          set -euo pipefail
          WORK_DIR="$(mktemp -d)"
          MOUNT_DIR="$WORK_DIR/mount"
          cleanup() {
            hdiutil detach "$MOUNT_DIR" >/dev/null 2>&1 || true
            rm -rf "$WORK_DIR"
          }
          trap cleanup EXIT

          while IFS= read -r package; do
            dmg="build/native/$PACKAGE_VERSION/$package"
            mkdir -p "$MOUNT_DIR"
            hdiutil attach -quiet -nobrowse -readonly -mountpoint "$MOUNT_DIR" "$dmg"
            app="$MOUNT_DIR/Kode Injector Helper.app"
            codesign --verify --deep --strict --verbose=2 "$app"
            xcrun stapler validate "$app"
            syspolicy_check distribution "$app"
            spctl --assess --type execute --verbose=2 "$app"
            hdiutil detach -quiet "$MOUNT_DIR"
            xcrun stapler validate "$dmg"
            spctl --assess --type open \
              --context context:primary-signature \
              --verbose=2 \
              "$dmg"
          done < <(pnpm exec tsx scripts/native-host/package.ts --list-macos-artifacts)
      - name: Refresh and verify checksums
        shell: bash
        env:
          PACKAGE_VERSION: ${{ needs.validate-release.outputs.version }}
        run: |
          set -euo pipefail
          pnpm exec tsx scripts/native-host/package.ts --list-artifacts \
            > "$RUNNER_TEMP/kode-injector-native-artifacts.txt"
          cd "build/native/$PACKAGE_VERSION"
          artifacts=()
          while IFS= read -r artifact; do
            artifacts+=("$artifact")
          done < "$RUNNER_TEMP/kode-injector-native-artifacts.txt"
          if [[ "${#artifacts[@]}" -eq 0 ]]; then
            echo "No native artifacts were declared" >&2
            exit 1
          fi
          shasum -a 256 "${artifacts[@]}" > SHA256SUMS
          shasum -a 256 -c SHA256SUMS
      - name: Retain signed release candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kode-injector-helper-${{ needs.validate-release.outputs.version }}
          path: build/native/${{ needs.validate-release.outputs.version }}/
          if-no-files-found: error
          retention-days: 30
      - name: Remove Apple signing credentials
        if: always()
        shell: bash
        run: |
          KEYCHAIN_PATH="${SIGNING_KEYCHAIN_PATH:-$RUNNER_TEMP/kode-injector-signing.keychain-db}"
          NOTARY_KEY_PATH="${APPLE_NOTARY_KEY_PATH:-$RUNNER_TEMP/kode-injector-notary-key.p8}"
          security delete-keychain "$KEYCHAIN_PATH" >/dev/null 2>&1 || true
          rm -f \
            "${SIGNING_CERTIFICATE_PATH:-$RUNNER_TEMP/kode-injector-signing.p12}" \
            "$NOTARY_KEY_PATH"

  draft-release:
    name: Create draft GitHub release
    if: github.event_name == 'push'
    needs: [validate-release, build-and-sign]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ needs.validate-release.outputs.tag }}
      PACKAGE_VERSION: ${{ needs.validate-release.outputs.version }}
    steps:
      - name: Download signed release candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: kode-injector-helper-${{ needs.validate-release.outputs.version }}
          path: release-assets
      - name: Verify release candidate
        working-directory: release-assets
        run: sha256sum -c SHA256SUMS
      - name: Refuse to replace an existing release
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists" >&2
            exit 1
          fi
      - name: Create draft release
        shell: bash
        run: |
          gh release create "$RELEASE_TAG" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --draft \
            --verify-tag \
            --title "Kode Injector Helper $PACKAGE_VERSION" \
            --notes "Signed Kode Injector Helper packages for Kode Injector $PACKAGE_VERSION."
