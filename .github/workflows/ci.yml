name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  native-changes:
    name: Detect native changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.changed }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Detect native changes
        id: filter
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          if [[ -z "$BASE_SHA" || "$BASE_SHA" =~ ^0+$ ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            DIFF_RANGE="$BASE_SHA...$HEAD_SHA"
          else
            DIFF_RANGE="$BASE_SHA..$HEAD_SHA"
          fi

          set +e
          git diff --quiet "$DIFF_RANGE" -- \
            .github/workflows/ci.yml \
            .github/workflows/release.yml \
            native-host/ \
            scripts/native-host/ \
            src/app/common/native-host-artifacts.ts \
            src/app/common/native-host-protocol.ts \
            package.json \
            pnpm-lock.yaml \
            pnpm-workspace.yaml \
            tsconfig.json
          DIFF_STATUS=$?
          set -e

          case "$DIFF_STATUS" in
            0) echo "changed=false" >> "$GITHUB_OUTPUT" ;;
            1) echo "changed=true" >> "$GITHUB_OUTPUT" ;;
            *) exit "$DIFF_STATUS" ;;
          esac

  extension:
    name: Validate and build extensions
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
      - name: Install dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile
      - name: Validate project
        run: pnpm validate
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Run core injection end-to-end test
        run: pnpm test:e2e
      - name: Build release extensions
        run: pnpm release

  native:
    name: Test native host
    needs: native-changes
    if: needs.native-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26.x'
          cache-dependency-path: native-host/go.sum
      - name: Run native-host tests
        working-directory: native-host
        run: go test -race ./...

  macos-helper:
    name: Test macOS helper
    needs: native-changes
    if: needs.native-changes.outputs.changed == 'true'
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26.x'
          cache-dependency-path: native-host/go.sum
      - name: Install dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile
      - name: Validate macOS helper packages
        run: pnpm native:macos:validate
